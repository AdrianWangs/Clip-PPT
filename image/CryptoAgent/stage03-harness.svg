<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 392" width="960" height="392">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #20242f; }
.label { font-size: 16px; font-weight: 700; }
.mlabel { font-size: 13px; font-weight: 700; }
.small { font-size: 12.5px; fill: #5a6373; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; fill: #5a6373; }
.op { font-size: 30px; font-weight: 700; fill: #aab0bd; }
.cap { font-size: 12.5px; fill: #5a6373; }
.hdr { font-size: 15px; font-weight: 800; fill: #0c6b4f; }
</style>
<defs>
<linearGradient id="g-core" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f3f2fe"/><stop offset="1" stop-color="#e7e6fc"/></linearGradient>
<filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#2a3354" flood-opacity="0.10"/></filter>
<filter id="sh-core" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#11926c" flood-opacity="0.13"/></filter>
</defs>
<rect width="960" height="392" fill="#ffffff"/>
<rect x="72" y="102" width="148" height="96" rx="16" fill="#ffffff" stroke="#d9d6f7" stroke-width="1.6" filter="url(#sh)"/>
<circle cx="146" cy="134" r="20" fill="#eeeefe"/>
<g transform="translate(146,134)" stroke="#4f46e5" fill="none" stroke-linecap="round" stroke-linejoin="round">
<rect x="-12" y="-9" width="24" height="17" rx="5" stroke-width="2"/>
<path d="M-6,8 L-6,13 L-1,8" stroke-width="2"/>
<line x1="-7" y1="-3" x2="7" y2="-3" stroke-width="1.7"/>
<line x1="-7" y1="2" x2="3" y2="2" stroke-width="1.7"/>
</g>
<text x="146" y="172" class="label" text-anchor="middle">Model</text>
<text x="146" y="190" class="small" text-anchor="middle">仅产生 token</text>
<text x="238" y="160" class="op" text-anchor="middle">+</text>
<rect x="256" y="70" width="440" height="160" rx="18" fill="#fbfdfc" stroke="#a4ddc9" stroke-width="1.7" filter="url(#sh-core)"/>
<text x="272" y="95" class="hdr" text-anchor="start">Harness</text>
<text x="338" y="95" class="small" text-anchor="start">模型之外的整层框架</text>
<rect x="268" y="104" width="132" height="52" rx="9" fill="#f1f9f5" stroke="#cdeadf" stroke-width="1.2"/>
<text x="334" y="130" class="mlabel" text-anchor="middle">系统提示</text>
<text x="334" y="146" class="mono" text-anchor="middle">System Prompt</text>
<rect x="410" y="104" width="132" height="52" rx="9" fill="#f1f9f5" stroke="#cdeadf" stroke-width="1.2"/>
<text x="476" y="130" class="mlabel" text-anchor="middle">工具 / MCP</text>
<text x="476" y="146" class="mono" text-anchor="middle">tools</text>
<rect x="552" y="104" width="132" height="52" rx="9" fill="#f1f9f5" stroke="#cdeadf" stroke-width="1.2"/>
<text x="618" y="130" class="mlabel" text-anchor="middle">检索 RAG</text>
<text x="618" y="146" class="mono" text-anchor="middle">retrieval</text>
<rect x="268" y="164" width="132" height="52" rx="9" fill="#f1f9f5" stroke="#cdeadf" stroke-width="1.2"/>
<text x="334" y="190" class="mlabel" text-anchor="middle">记忆</text>
<text x="334" y="206" class="mono" text-anchor="middle">memory</text>
<rect x="410" y="164" width="132" height="52" rx="9" fill="#f1f9f5" stroke="#cdeadf" stroke-width="1.2"/>
<text x="476" y="190" class="mlabel" text-anchor="middle">权限</text>
<text x="476" y="206" class="mono" text-anchor="middle">access</text>
<rect x="552" y="164" width="132" height="52" rx="9" fill="#f1f9f5" stroke="#cdeadf" stroke-width="1.2"/>
<text x="618" y="190" class="mlabel" text-anchor="middle">编排</text>
<text x="618" y="206" class="mono" text-anchor="middle">orchestrate</text>
<text x="716" y="160" class="op" text-anchor="middle">=</text>
<rect x="736" y="102" width="148" height="96" rx="16" fill="url(#g-core)" stroke="#c8c5f6" stroke-width="1.7" filter="url(#sh)"/>
<circle cx="810" cy="134" r="20" fill="#ffffff" stroke="#d9d6f7" stroke-width="1.4"/>
<g transform="translate(810,135)" stroke="#4f46e5" fill="none" stroke-linecap="round" stroke-linejoin="round">
<rect x="-11" y="-7" width="22" height="17" rx="5" stroke-width="2"/>
<line x1="0" y1="-7" x2="0" y2="-13" stroke-width="2"/><circle cx="0" cy="-14" r="1.8" fill="#4f46e5" stroke="none"/>
<circle cx="-5" cy="1" r="1.9" fill="#4f46e5" stroke="none"/><circle cx="5" cy="1" r="1.9" fill="#4f46e5" stroke="none"/>
</g>
<text x="810" y="172" class="label" text-anchor="middle">Agent</text>
<text x="810" y="190" class="small" text-anchor="middle">能干活的系统</text>
<text x="476" y="252" class="cap" text-anchor="middle">2026：Harness 已成独立工程，排在 prompt / context engineering 之后</text>
<rect x="60" y="282" width="840" height="84" rx="14" fill="#fafbfd" stroke="#e1e4ee" stroke-width="1.4" filter="url(#sh)"/>
<rect x="60" y="282" width="6" height="84" rx="3" fill="#e0533d"/>
<text x="92" y="314" class="small"><tspan fill="#e0533d" font-weight="700">关键风险　</tspan>query、上下文、文档跨过信任边界；工具与长期记忆的访问边界可能被绕过。</text>
<text x="92" y="344" class="small"><tspan fill="#11926c" font-weight="700">对应接口　</tspan>SSE 保护检索，ABE 把访问策略写进密文，PSI 支持跨库匹配。</text>
</svg>