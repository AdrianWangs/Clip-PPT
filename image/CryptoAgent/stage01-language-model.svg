<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 78 960 462" width="960" height="462">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #20242f; }
.label { font-size: 16px; font-weight: 700; }
.small { font-size: 13px; fill: #5a6373; }
.hd { font-size: 15px; font-weight: 700; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
</style>
<defs>
<linearGradient id="g-core" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#f3f2fe"/><stop offset="1" stop-color="#e7e6fc"/>
</linearGradient>
<linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#6d68f0"/><stop offset="1" stop-color="#4f46e5"/>
</linearGradient>
<marker id="ar-brand" markerWidth="9" markerHeight="7" refX="7.5" refY="3.5" orient="auto">
<path d="M0,0 L9,3.5 L0,7 Z" fill="#4f46e5"/>
</marker>
<filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#2a3354" flood-opacity="0.10"/>
</filter>
<filter id="sh-core" x="-30%" y="-30%" width="160%" height="160%">
<feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#4f46e5" flood-opacity="0.16"/>
</filter>
</defs>
<rect x="0" y="78" width="960" height="462" fill="#ffffff"/>

<!-- 主流程: 用户输入 -> LLM -> 文本输出 (中线 y=170) -->
<!-- 用户输入 -->
<rect x="58" y="122" width="168" height="96" rx="14" fill="#ffffff" stroke="#e1e4ee" stroke-width="1.5" filter="url(#sh)"/>
<g transform="translate(142,150)" stroke="#5a6373" fill="none" stroke-linecap="round" stroke-linejoin="round">
<circle cx="0" cy="-4" r="7" stroke-width="2"/>
<path d="M-12,15 C-12,4 12,4 12,15" stroke-width="2"/>
</g>
<text x="142" y="192" class="label" text-anchor="middle">用户输入</text>
<text x="142" y="210" class="mono" text-anchor="middle" fill="#5a6373">prompt / context</text>

<line x1="226" y1="170" x2="332" y2="170" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#ar-brand)"/>

<!-- LLM 推理 核心 -->
<rect x="338" y="108" width="300" height="124" rx="20" fill="url(#g-core)" stroke="#c8c5f6" stroke-width="1.8" filter="url(#sh-core)"/>
<g transform="translate(398,170)">
<circle r="34" fill="#ffffff" stroke="#d9d6f7" stroke-width="1.5"/>
<g stroke="#4f46e5" fill="none" stroke-linecap="round" stroke-linejoin="round">
<path d="M-18,-12 h30 a5,5 0 0 1 5,5 v14 a5,5 0 0 1 -5,5 h-19 l-9,8 v-8 h-2 a5,5 0 0 1 -5,-5 v-14 a5,5 0 0 1 5,-5 Z" stroke-width="2.2" fill="#eeeefe"/>
<line x1="-10" y1="-3" x2="10" y2="-3" stroke-width="2"/>
<line x1="-10" y1="4" x2="4" y2="4" stroke-width="2"/>
</g>
</g>
<text x="452" y="152" class="label" text-anchor="start">LLM 推理</text>
<text x="452" y="176" class="small" text-anchor="start">生成、总结、规划</text>
<text x="452" y="198" class="small" text-anchor="start" fill="#8a91a0">内部过程对用户不可见</text>

<line x1="638" y1="170" x2="744" y2="170" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#ar-brand)"/>

<!-- 文本输出 (文档形) -->
<g filter="url(#sh)">
<path d="M744,122 H872 L900,150 V218 H744 Z" fill="#ffffff" stroke="#e1e4ee" stroke-width="1.5"/>
<path d="M872,122 V150 H900" fill="none" stroke="#e1e4ee" stroke-width="1.5"/>
</g>
<line x1="762" y1="162" x2="852" y2="162" stroke="#cdd2de" stroke-width="2" stroke-linecap="round"/>
<line x1="762" y1="174" x2="852" y2="174" stroke="#cdd2de" stroke-width="2" stroke-linecap="round"/>
<text x="822" y="200" class="label" text-anchor="middle">文本输出</text>

<!-- 风险 / 密码学接口 双卡 (y=320) -->
<rect x="58" y="318" width="402" height="150" rx="16" fill="#fdf2ef" stroke="#f4cabd" stroke-width="1.5" filter="url(#sh)"/>
<rect x="58" y="318" width="6" height="150" rx="3" fill="#e0533d"/>
<circle cx="96" cy="352" r="13" fill="#fdeee9"/>
<path d="M96,345 v8 M96,358 v0.5" stroke="#e0533d" stroke-width="2.4" stroke-linecap="round"/>
<text x="120" y="357" class="hd" fill="#e0533d">风险</text>
<text x="84" y="392" class="small">用户只能看到输入和输出，</text>
<text x="84" y="414" class="small">无法确认是否按承诺模型计算。</text>
<text x="84" y="444" class="small">服务方替换模型或省略步骤，外部难以判断。</text>

<rect x="500" y="318" width="402" height="150" rx="16" fill="#ecf7f2" stroke="#a4ddc9" stroke-width="1.5" filter="url(#sh)"/>
<rect x="500" y="318" width="6" height="150" rx="3" fill="#11926c"/>
<circle cx="538" cy="352" r="13" fill="#e6f5ef"/>
<path d="M533,352 l3.5,3.5 l6,-7" stroke="#11926c" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="562" y="357" class="hd" fill="#11926c">密码学接口</text>
<text x="526" y="392" class="small">模型版本承诺、输出签名、</text>
<text x="526" y="414" class="small">关键推理步骤证明。</text>
<text x="526" y="444" class="small">目标不是相信平台声明，而是验证可检查的证据。</text>
</svg>
