<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #20242f; }
.title { font-size: 27px; font-weight: 800; letter-spacing: -0.5px; }
.subtitle { font-size: 14px; fill: #5a6373; }
.label { font-size: 16px; font-weight: 700; }
.small { font-size: 12.5px; fill: #5a6373; }
.tiny { font-size: 11px; font-weight: 600; }
.axislabel { font-size: 13px; font-weight: 600; fill: #20242f; }
</style>
<defs>
<linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#6d68f0"/><stop offset="1" stop-color="#4f46e5"/>
</linearGradient>
<linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#d9a52f"/><stop offset="1" stop-color="#b8841a"/>
</linearGradient>
<linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#1bae8a"/><stop offset="1" stop-color="#11926c"/>
</linearGradient>
<linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#ee6c54"/><stop offset="1" stop-color="#e0533d"/>
</linearGradient>
<linearGradient id="g-axis" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#4f46e5"/><stop offset="0.33" stop-color="#b8841a"/>
<stop offset="0.66" stop-color="#11926c"/><stop offset="1" stop-color="#e0533d"/>
</linearGradient>
<marker id="ar-gray" markerWidth="9" markerHeight="7" refX="7.5" refY="3.5" orient="auto">
<path d="M0,0 L9,3.5 L0,7 Z" fill="#aab0bd"/>
</marker>
<filter id="card-sh" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#2a3354" flood-opacity="0.10"/>
</filter>
<filter id="dot-sh" x="-60%" y="-60%" width="220%" height="220%">
<feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2a3354" flood-opacity="0.22"/>
</filter>
</defs>
<rect width="960" height="540" fill="#ffffff"/>
<text x="40" y="50" class="title">Agent 四阶段总览</text>
<text x="40" y="76" class="subtitle">能力越往后，越接近真实系统，信任边界越清楚。</text>

<!-- ============ 阶段卡片 ============ -->
<!-- 卡片中心: 139 / 365 / 591 / 817 -->

<!-- 阶段一 语言模型 -->
<g>
<rect x="48" y="110" width="182" height="266" rx="18" fill="#ffffff" stroke="#d9d6f7" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="48" y="110" width="182" height="6" rx="3" fill="url(#g-indigo)"/>
<circle cx="78" cy="150" r="17" fill="url(#g-indigo)" filter="url(#dot-sh)"/>
<text x="78" y="155" class="tiny" text-anchor="middle" fill="#ffffff">01</text>
<text x="104" y="146" class="label">语言模型</text>
<text x="104" y="167" class="small">Prompt → Text</text>
<g transform="translate(139,214)" stroke="#4f46e5" stroke-linecap="round" stroke-linejoin="round">
<circle r="27" fill="#eeeefe" stroke="none"/>
<rect x="-17" y="-13" width="34" height="24" rx="7" fill="none" stroke-width="2.2"/>
<path d="M-9,11 L-9,18 L-2,11" fill="none" stroke-width="2.2"/>
<line x1="-10" y1="-4" x2="10" y2="-4" stroke-width="2"/>
<line x1="-10" y1="3" x2="4" y2="3" stroke-width="2"/>
</g>
<circle cx="76" cy="274" r="3.2" fill="#4f46e5"/><text x="90" y="278" class="small">生成</text>
<circle cx="76" cy="298" r="3.2" fill="#4f46e5"/><text x="90" y="302" class="small">推理</text>
<circle cx="76" cy="322" r="3.2" fill="#4f46e5"/><text x="90" y="326" class="small">规划</text>
<line x1="68" y1="342" x2="210" y2="342" stroke="#ece9fb" stroke-width="1.2"/>
<text x="68" y="364" class="small" fill="#e0533d">缺口：可验证性</text>
</g>

<!-- 阶段二 Agent -->
<g>
<rect x="274" y="110" width="182" height="266" rx="18" fill="#ffffff" stroke="#ecd9ac" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="274" y="110" width="182" height="6" rx="3" fill="url(#g-amber)"/>
<circle cx="304" cy="150" r="17" fill="url(#g-amber)" filter="url(#dot-sh)"/>
<text x="304" y="155" class="tiny" text-anchor="middle" fill="#ffffff">02</text>
<text x="330" y="146" class="label">Agent</text>
<text x="330" y="167" class="small">Goal → Action</text>
<g transform="translate(365,214)" stroke="#b8841a" stroke-linecap="round" stroke-linejoin="round">
<circle r="27" fill="#fbf2dd" stroke="none"/>
<circle r="15" fill="none" stroke-width="2.2"/>
<circle r="5.5" fill="#b8841a" stroke="none"/>
<line x1="0" y1="-21.5" x2="0" y2="-15" stroke-width="2.2"/>
<line x1="0" y1="15" x2="0" y2="21.5" stroke-width="2.2"/>
<line x1="-21.5" y1="0" x2="-15" y2="0" stroke-width="2.2"/>
<line x1="15" y1="0" x2="21.5" y2="0" stroke-width="2.2"/>
</g>
<circle cx="302" cy="274" r="3.2" fill="#b8841a"/><text x="316" y="278" class="small">拆任务</text>
<circle cx="302" cy="298" r="3.2" fill="#b8841a"/><text x="316" y="302" class="small">选工具</text>
<circle cx="302" cy="322" r="3.2" fill="#b8841a"/><text x="316" y="326" class="small">看反馈</text>
<line x1="294" y1="342" x2="436" y2="342" stroke="#f5ecd4" stroke-width="1.2"/>
<text x="294" y="364" class="small" fill="#e0533d">缺口：行动可信</text>
</g>

<!-- 阶段三 Harness -->
<g>
<rect x="500" y="110" width="182" height="266" rx="18" fill="#ffffff" stroke="#b8e6d6" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="500" y="110" width="182" height="6" rx="3" fill="url(#g-green)"/>
<circle cx="530" cy="150" r="17" fill="url(#g-green)" filter="url(#dot-sh)"/>
<text x="530" y="155" class="tiny" text-anchor="middle" fill="#ffffff">03</text>
<text x="556" y="146" class="label">Harness</text>
<text x="556" y="167" class="small">Model + Tools + Data</text>
<g transform="translate(591,214)" stroke="#11926c" stroke-linecap="round" stroke-linejoin="round">
<circle r="27" fill="#e6f5ef" stroke="none"/>
<circle r="6" fill="#11926c" stroke="none"/>
<line x1="0" y1="0" x2="-14" y2="-12" stroke-width="2"/><circle cx="-15.5" cy="-13.5" r="4" fill="none" stroke-width="2"/>
<line x1="0" y1="0" x2="14" y2="-12" stroke-width="2"/><circle cx="15.5" cy="-13.5" r="4" fill="none" stroke-width="2"/>
<line x1="0" y1="0" x2="-14" y2="12" stroke-width="2"/><circle cx="-15.5" cy="13.5" r="4" fill="none" stroke-width="2"/>
<line x1="0" y1="0" x2="14" y2="12" stroke-width="2"/><circle cx="15.5" cy="13.5" r="4" fill="none" stroke-width="2"/>
</g>
<circle cx="528" cy="274" r="3.2" fill="#11926c"/><text x="542" y="278" class="small">RAG</text>
<circle cx="528" cy="298" r="3.2" fill="#11926c"/><text x="542" y="302" class="small">记忆</text>
<circle cx="528" cy="322" r="3.2" fill="#11926c"/><text x="542" y="326" class="small">权限</text>
<line x1="520" y1="342" x2="662" y2="342" stroke="#dcf0e8" stroke-width="1.2"/>
<text x="520" y="364" class="small" fill="#e0533d">缺口：输入隐私 / 访问控制</text>
</g>

<!-- 阶段四 Loop -->
<g>
<rect x="726" y="110" width="182" height="266" rx="18" fill="#ffffff" stroke="#f4cabd" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="726" y="110" width="182" height="6" rx="3" fill="url(#g-red)"/>
<circle cx="756" cy="150" r="17" fill="url(#g-red)" filter="url(#dot-sh)"/>
<text x="756" y="155" class="tiny" text-anchor="middle" fill="#ffffff">04</text>
<text x="782" y="146" class="label">Loop</text>
<text x="782" y="167" class="small">Loop Engineering</text>
<g transform="translate(817,214)" stroke="#e0533d" stroke-linecap="round" stroke-linejoin="round">
<circle r="27" fill="#fdeee9" stroke="none"/>
<path d="M-14,-5 A 14 14 0 0 1 12,-8" fill="none" stroke-width="2.2"/>
<path d="M12,-13 L13,-7 L7,-7" fill="none" stroke-width="2.2"/>
<path d="M14,5 A 14 14 0 0 1 -12,8" fill="none" stroke-width="2.2"/>
<path d="M-12,13 L-13,7 L-7,7" fill="none" stroke-width="2.2"/>
</g>
<circle cx="754" cy="274" r="3.2" fill="#e0533d"/><text x="768" y="278" class="small">多轮</text>
<circle cx="754" cy="298" r="3.2" fill="#e0533d"/><text x="768" y="302" class="small">协作</text>
<circle cx="754" cy="322" r="3.2" fill="#e0533d"/><text x="768" y="326" class="small">留证据</text>
<line x1="746" y1="342" x2="888" y2="342" stroke="#fbe1d9" stroke-width="1.2"/>
<text x="746" y="364" class="small" fill="#e0533d">缺口：多方互信</text>
</g>

<!-- 阶段间箭头 -->
<line x1="238" y1="243" x2="266" y2="243" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>
<line x1="464" y1="243" x2="492" y2="243" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>
<line x1="690" y1="243" x2="718" y2="243" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>

<!-- ============ 底部信任边界时间轴 ============ -->
<line x1="110" y1="426" x2="846" y2="426" stroke="url(#g-axis)" stroke-width="2.5" stroke-linecap="round"/>
<g><circle cx="139" cy="426" r="11" fill="#4f46e5" opacity="0.16"/><circle cx="139" cy="426" r="6" fill="url(#g-indigo)" filter="url(#dot-sh)"/><text x="139" y="456" class="axislabel" text-anchor="middle">可验证性</text></g>
<g><circle cx="365" cy="426" r="11" fill="#b8841a" opacity="0.16"/><circle cx="365" cy="426" r="6" fill="url(#g-amber)" filter="url(#dot-sh)"/><text x="365" y="456" class="axislabel" text-anchor="middle">行动可信</text></g>
<g><circle cx="591" cy="426" r="11" fill="#11926c" opacity="0.16"/><circle cx="591" cy="426" r="6" fill="url(#g-green)" filter="url(#dot-sh)"/><text x="591" y="456" class="axislabel" text-anchor="middle">数据隐私</text></g>
<g><circle cx="817" cy="426" r="11" fill="#e0533d" opacity="0.16"/><circle cx="817" cy="426" r="6" fill="url(#g-red)" filter="url(#dot-sh)"/><text x="817" y="456" class="axislabel" text-anchor="middle">多方互信</text></g>

<text x="480" y="502" class="subtitle" text-anchor="middle" font-weight="600">报告主线：把 AI 放进有边界的 Agent 系统，再在信任边界上放密码学。</text>
</svg>
