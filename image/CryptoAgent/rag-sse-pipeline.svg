<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #20242f; }
.title { font-size: 27px; font-weight: 800; letter-spacing: -0.5px; }
.subtitle { font-size: 14px; fill: #5a6373; }
.label { font-size: 15.5px; font-weight: 700; }
.sub { font-size: 12px; font-weight: 600; fill: #5a6373; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #11926c; font-weight: 600; }
.evmain { font-size: 15px; font-weight: 700; }
.evtiny { font-size: 11.5px; font-weight: 600; fill: #8a92a3; }
.badge { font-size: 10.5px; font-weight: 700; fill: #ffffff; }
.callout { font-size: 13px; font-weight: 600; }
</style>
<defs>
<linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#6d68f0"/><stop offset="1" stop-color="#4f46e5"/>
</linearGradient>
<linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#1bae8a"/><stop offset="1" stop-color="#11926c"/>
</linearGradient>
<linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#d9a52f"/><stop offset="1" stop-color="#b8841a"/>
</linearGradient>
<linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#ee6c54"/><stop offset="1" stop-color="#e0533d"/>
</linearGradient>
<marker id="ar-gray" markerWidth="9" markerHeight="7" refX="7.5" refY="3.5" orient="auto">
<path d="M0,0 L9,3.5 L0,7 Z" fill="#aab0bd"/>
</marker>
<filter id="card-sh" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#2a3354" flood-opacity="0.10"/>
</filter>
<filter id="dot-sh" x="-60%" y="-60%" width="220%" height="220%">
<feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2a3354" flood-opacity="0.20"/>
</filter>
</defs>
<rect width="960" height="540" fill="#ffffff"/>
<text x="40" y="50" class="title">RAG + SSE：让数据接入隐私化</text>
<text x="40" y="76" class="subtitle">服务器可以完成检索，但不直接看到 query 和文档明文。</text>

<!-- ===== 顶部管线 4 节点，中心: 153 / 371 / 589 / 807 ===== -->

<!-- 用户 query -->
<g>
<rect x="69" y="136" width="168" height="108" rx="18" fill="#ffffff" stroke="#d9d6f7" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="69" y="136" width="168" height="6" rx="3" fill="url(#g-indigo)"/>
<circle cx="153" cy="176" r="26" fill="#eeeefe"/>
<g transform="translate(153,176)" stroke="#4f46e5" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<circle cx="0" cy="-6" r="6"/>
<path d="M-11,13 a11,11 0 0 1 22,0"/>
</g>
<text x="153" y="216" class="label" text-anchor="middle">用户 query</text>
<text x="153" y="236" class="sub" text-anchor="middle">敏感意图</text>
</g>

<!-- Tokenize -->
<g>
<rect x="287" y="136" width="168" height="108" rx="18" fill="#ffffff" stroke="#b8e6d6" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="287" y="136" width="168" height="6" rx="3" fill="url(#g-green)"/>
<circle cx="371" cy="176" r="26" fill="#e6f5ef"/>
<g transform="translate(371,176)" stroke="#11926c" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<rect x="-10" y="-1" width="20" height="14" rx="3"/>
<path d="M-5.5,-1 V-7 a5.5,5.5 0 0 1 11,0 V-1"/>
<circle cx="0" cy="6" r="1.6" fill="#11926c" stroke="none"/>
</g>
<text x="371" y="216" class="label" text-anchor="middle">Tokenize</text>
<text x="371" y="236" class="mono" text-anchor="middle">tk_w</text>
</g>

<!-- 密文索引 EDB -->
<g>
<rect x="505" y="136" width="168" height="108" rx="18" fill="#ffffff" stroke="#b8e6d6" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="505" y="136" width="168" height="6" rx="3" fill="url(#g-green)"/>
<circle cx="589" cy="176" r="26" fill="#e6f5ef"/>
<g transform="translate(589,176)" stroke="#11926c" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<ellipse cx="0" cy="-10" rx="12" ry="4"/>
<path d="M-12,-10 V8 a12,4 0 0 0 24,0 V-10"/>
<path d="M-12,-1 a12,4 0 0 0 24,0"/>
</g>
<text x="589" y="216" class="label" text-anchor="middle">密文索引 EDB</text>
<text x="589" y="236" class="sub" text-anchor="middle">服务器只见密文</text>
</g>

<!-- 文档 id -->
<g>
<rect x="723" y="136" width="168" height="108" rx="18" fill="#ffffff" stroke="#d9d6f7" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="723" y="136" width="168" height="6" rx="3" fill="url(#g-indigo)"/>
<circle cx="807" cy="176" r="26" fill="#eeeefe"/>
<g transform="translate(807,176)" stroke="#4f46e5" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<path d="M-9,-12 H4 L11,-5 V13 H-9 Z"/>
<path d="M4,-12 V-5 H11"/>
<line x1="-4" y1="0" x2="6" y2="0"/>
<line x1="-4" y1="6" x2="3" y2="6"/>
</g>
<text x="807" y="216" class="label" text-anchor="middle">文档 id</text>
<text x="807" y="236" class="sub" text-anchor="middle">再授权解密</text>
</g>

<!-- 管线箭头 -->
<line x1="241" y1="176" x2="283" y2="176" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>
<line x1="459" y1="176" x2="501" y2="176" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>
<line x1="677" y1="176" x2="719" y2="176" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>

<!-- ===== 三项评价，中心: 198 / 480 / 762 ===== -->

<!-- 评价一 检索质量 -->
<g>
<rect x="69" y="288" width="258" height="116" rx="18" fill="#ffffff" stroke="#b8e6d6" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="69" y="288" width="258" height="6" rx="3" fill="url(#g-green)"/>
<circle cx="198" cy="328" r="22" fill="#e6f5ef"/>
<g transform="translate(198,328)" stroke="#11926c" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<circle r="12"/><circle r="6"/><circle r="1.6" fill="#11926c" stroke="none"/>
</g>
<circle cx="216" cy="310" r="9" fill="url(#g-green)" filter="url(#dot-sh)"/>
<text x="216" y="313.5" class="badge" text-anchor="middle">1</text>
<text x="198" y="370" class="evmain" text-anchor="middle">检索质量</text>
<text x="198" y="391" class="evtiny" text-anchor="middle">召回率 / 准确率</text>
</g>

<!-- 评价二 泄露上界 -->
<g>
<rect x="351" y="288" width="258" height="116" rx="18" fill="#ffffff" stroke="#f4cabd" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="351" y="288" width="258" height="6" rx="3" fill="url(#g-red)"/>
<circle cx="480" cy="328" r="22" fill="#fdeee9"/>
<g transform="translate(480,328)" stroke="#e0533d" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M-13,0 C-7,-8 7,-8 13,0 C7,8 -7,8 -13,0 Z"/>
<circle cx="0" cy="0" r="3.4" fill="#e0533d" stroke="none"/>
<line x1="-12" y1="-9" x2="12" y2="9"/>
</g>
<circle cx="498" cy="310" r="9" fill="url(#g-red)" filter="url(#dot-sh)"/>
<text x="498" y="313.5" class="badge" text-anchor="middle">2</text>
<text x="480" y="370" class="evmain" text-anchor="middle">泄露上界</text>
<text x="480" y="391" class="evtiny" text-anchor="middle">访问模式 / 结果大小</text>
</g>

<!-- 评价三 系统开销 -->
<g>
<rect x="633" y="288" width="258" height="116" rx="18" fill="#ffffff" stroke="#ecd9ac" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="633" y="288" width="258" height="6" rx="3" fill="url(#g-amber)"/>
<circle cx="762" cy="328" r="22" fill="#fbf2dd"/>
<g transform="translate(762,330)" stroke="#b8841a" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M-13,4 A13,13 0 0 1 13,4"/>
<line x1="0" y1="4" x2="7" y2="-6"/>
<circle cx="0" cy="4" r="2.2" fill="#b8841a" stroke="none"/>
</g>
<circle cx="780" cy="310" r="9" fill="url(#g-amber)" filter="url(#dot-sh)"/>
<text x="780" y="313.5" class="badge" text-anchor="middle">3</text>
<text x="762" y="370" class="evmain" text-anchor="middle">系统开销</text>
<text x="762" y="391" class="evtiny" text-anchor="middle">延迟 / 通信 / 索引</text>
</g>

<!-- ===== 底部研究空白 ===== -->
<rect x="130" y="430" width="700" height="60" rx="16" fill="#eeeefe" stroke="#c8c5f6" stroke-width="1.3" filter="url(#card-sh)"/>
<circle cx="172" cy="460" r="17" fill="url(#g-indigo)"/>
<g transform="translate(172,460)" stroke="#ffffff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M-5,-3 a5,5 0 1 1 10,0 c0,3 -3,4 -4,6 H-1 c-1,-2 -4,-3 -4,-6 Z"/>
<line x1="-2.5" y1="8" x2="2.5" y2="8"/>
</g>
<text x="206" y="466" class="callout" fill="#3a32c4">研究空白：经典关键词 SSE 与现代语义检索、向量近邻之间还没有完全打通。</text>
</svg>
