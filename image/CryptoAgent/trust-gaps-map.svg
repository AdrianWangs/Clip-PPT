<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #20242f; }
.title { font-size: 27px; font-weight: 800; letter-spacing: -0.5px; }
.subtitle { font-size: 14px; fill: #5a6373; }
.label { font-size: 16px; font-weight: 700; }
.now { font-size: 12.5px; font-weight: 600; fill: #e0533d; }
.tiny { font-size: 11px; font-weight: 600; fill: #8a92a3; }
.crypto { font-size: 13px; font-weight: 700; fill: #11926c; }
.callout { font-size: 13.5px; font-weight: 600; }
</style>
<defs>
<linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#6d68f0"/><stop offset="1" stop-color="#4f46e5"/>
</linearGradient>
<linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#1bae8a"/><stop offset="1" stop-color="#11926c"/>
</linearGradient>
<linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#d9a52f"/><stop offset="1" stop-color="#b8841a"/>
</linearGradient>
<linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#ee6c54"/><stop offset="1" stop-color="#e0533d"/>
</linearGradient>
<marker id="ar-gray" markerWidth="9" markerHeight="7" refX="7.5" refY="3.5" orient="auto">
<path d="M0,0 L9,3.5 L0,7 Z" fill="#aab0bd"/>
</marker>
<filter id="card-sh" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#2a3354" flood-opacity="0.10"/>
</filter>
</defs>
<rect width="960" height="540" fill="#ffffff"/>
<text x="40" y="50" class="title">风险的本质：四类信任缺口</text>
<text x="40" y="76" class="subtitle">把阶段风险收敛成四个可以立题的问题。</text>

<!-- 卡片中心: 158 / 373 / 588 / 803 -->

<!-- 可验证性 -->
<g>
<rect x="70" y="116" width="175" height="252" rx="18" fill="#ffffff" stroke="#d9d6f7" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="70" y="116" width="175" height="6" rx="3" fill="url(#g-indigo)"/>
<circle cx="158" cy="166" r="28" fill="#eeeefe"/>
<g transform="translate(158,166)" stroke="#4f46e5" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<path d="M0,-15 L13,-9 V1 C13,10 0,16 0,16 C0,16 -13,10 -13,1 V-9 Z"/>
<path d="M-6,-1 L-2,4 L7,-6"/>
</g>
<text x="158" y="216" class="label" text-anchor="middle">可验证性</text>
<text x="158" y="240" class="now" text-anchor="middle">现在：信平台</text>
<line x1="100" y1="262" x2="215" y2="262" stroke="#ece9fb" stroke-width="1.3"/>
<text x="158" y="290" class="tiny" text-anchor="middle">替换为</text>
<text x="158" y="320" class="crypto" text-anchor="middle">ZKP + 承诺 + 签名</text>
</g>

<!-- 输入隐私 -->
<g>
<rect x="285" y="116" width="175" height="252" rx="18" fill="#ffffff" stroke="#b8e6d6" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="285" y="116" width="175" height="6" rx="3" fill="url(#g-green)"/>
<circle cx="373" cy="166" r="28" fill="#e6f5ef"/>
<g transform="translate(373,166)" stroke="#11926c" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<path d="M-14,0 C-8,-8 8,-8 14,0 C8,8 -8,8 -14,0 Z"/>
<circle cx="0" cy="0" r="3.6" fill="#11926c" stroke="none"/>
<line x1="-13" y1="-9" x2="13" y2="9"/>
</g>
<text x="373" y="216" class="label" text-anchor="middle">输入隐私</text>
<text x="373" y="240" class="now" text-anchor="middle">现在：信服务方不看</text>
<line x1="315" y1="262" x2="430" y2="262" stroke="#dcf0e8" stroke-width="1.3"/>
<text x="373" y="290" class="tiny" text-anchor="middle">替换为</text>
<text x="373" y="320" class="crypto" text-anchor="middle">SSE + FHE</text>
</g>

<!-- 访问控制 -->
<g>
<rect x="500" y="116" width="175" height="252" rx="18" fill="#ffffff" stroke="#ecd9ac" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="500" y="116" width="175" height="6" rx="3" fill="url(#g-amber)"/>
<circle cx="588" cy="166" r="28" fill="#fbf2dd"/>
<g transform="translate(588,166)" stroke="#b8841a" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<circle cx="-5" cy="-5" r="6"/>
<line x1="-0.5" y1="-0.5" x2="11" y2="11"/>
<line x1="11" y1="11" x2="14" y2="8"/>
<line x1="7.5" y1="7.5" x2="10" y2="5"/>
</g>
<text x="588" y="216" class="label" text-anchor="middle">访问控制</text>
<text x="588" y="240" class="now" text-anchor="middle">现在：信权限系统</text>
<line x1="530" y1="262" x2="645" y2="262" stroke="#f5ecd4" stroke-width="1.3"/>
<text x="588" y="290" class="tiny" text-anchor="middle">替换为</text>
<text x="588" y="320" class="crypto" text-anchor="middle">ABE + PSI</text>
</g>

<!-- 多方互信 -->
<g>
<rect x="715" y="116" width="175" height="252" rx="18" fill="#ffffff" stroke="#f4cabd" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="715" y="116" width="175" height="6" rx="3" fill="url(#g-red)"/>
<circle cx="803" cy="166" r="28" fill="#fdeee9"/>
<g transform="translate(803,166)" stroke="#e0533d" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<line x1="0" y1="-10" x2="-11" y2="8"/>
<line x1="0" y1="-10" x2="11" y2="8"/>
<line x1="-11" y1="8" x2="11" y2="8"/>
<circle cx="0" cy="-11" r="3.8" fill="#e0533d" stroke="none"/>
<circle cx="-12" cy="9" r="3.8" fill="#e0533d" stroke="none"/>
<circle cx="12" cy="9" r="3.8" fill="#e0533d" stroke="none"/>
</g>
<text x="803" y="216" class="label" text-anchor="middle">多方互信</text>
<text x="803" y="240" class="now" text-anchor="middle">现在：信中心方</text>
<line x1="745" y1="262" x2="860" y2="262" stroke="#fbe1d9" stroke-width="1.3"/>
<text x="803" y="290" class="tiny" text-anchor="middle">替换为</text>
<text x="803" y="320" class="crypto" text-anchor="middle">MPC + FHE + 承诺</text>
</g>

<!-- 卡片间箭头 -->
<line x1="250" y1="242" x2="280" y2="242" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>
<line x1="465" y1="242" x2="495" y2="242" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>
<line x1="680" y1="242" x2="710" y2="242" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>

<!-- 底部共同点 -->
<rect x="125" y="408" width="710" height="66" rx="16" fill="#e6f5ef" stroke="#a4ddc9" stroke-width="1.3" filter="url(#card-sh)"/>
<circle cx="168" cy="441" r="18" fill="url(#g-green)"/>
<g transform="translate(168,441)" stroke="#ffffff" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
<path d="M-6,0 L-1.5,4.5 L7,-5"/>
</g>
<text x="206" y="447" class="callout" fill="#0f7a5a">密码学的作用：把“信任某个对象”改成“不完全信任也能验证关键性质”。</text>
</svg>
