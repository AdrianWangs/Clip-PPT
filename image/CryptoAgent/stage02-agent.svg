<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 72 960 468" width="960" height="468">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #20242f; }
.label { font-size: 16px; font-weight: 700; }
.small { font-size: 13px; fill: #5a6373; }
.hd { font-size: 15px; font-weight: 700; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
.chip { font-size: 12.5px; font-weight: 600; fill: #4f46e5; }
.cap { font-size: 11.5px; font-weight: 600; }
</style>
<defs>
<linearGradient id="g-core" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#f3f2fe"/><stop offset="1" stop-color="#e7e6fc"/>
</linearGradient>
<marker id="ar-brand" markerWidth="9" markerHeight="7" refX="7.5" refY="3.5" orient="auto">
<path d="M0,0 L9,3.5 L0,7 Z" fill="#4f46e5"/>
</marker>
<marker id="ar-loop" markerWidth="8" markerHeight="6.5" refX="6.5" refY="3.25" orient="auto">
<path d="M0,0 L8,3.25 L0,6.5 Z" fill="#7c6df2"/>
</marker>
<filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#2a3354" flood-opacity="0.10"/>
</filter>
<filter id="sh-core" x="-30%" y="-30%" width="160%" height="160%">
<feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.16"/>
</filter>
</defs>
<rect x="0" y="72" width="960" height="468" fill="#ffffff"/>

<!-- 用户目标 (中线 y=176) -->
<rect x="40" y="128" width="160" height="96" rx="14" fill="#ffffff" stroke="#e1e4ee" stroke-width="1.5" filter="url(#sh)"/>
<g transform="translate(120,154)" stroke="#5a6373" fill="none" stroke-linecap="round" stroke-linejoin="round">
<circle cx="0" cy="0" r="9" stroke-width="2"/>
<circle cx="0" cy="0" r="3" fill="#5a6373" stroke="none"/>
<line x1="0" y1="-13" x2="0" y2="-9" stroke-width="2"/><line x1="0" y1="9" x2="0" y2="13" stroke-width="2"/>
<line x1="-13" y1="0" x2="-9" y2="0" stroke-width="2"/><line x1="9" y1="0" x2="13" y2="0" stroke-width="2"/>
</g>
<text x="120" y="200" class="label" text-anchor="middle">用户目标</text>
<text x="120" y="217" class="mono" text-anchor="middle" fill="#5a6373">goal</text>

<line x1="200" y1="176" x2="312" y2="176" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#ar-brand)"/>

<!-- Agent Core -->
<rect x="318" y="104" width="338" height="172" rx="20" fill="url(#g-core)" stroke="#c8c5f6" stroke-width="1.8" filter="url(#sh-core)"/>
<text x="487" y="138" class="label" text-anchor="middle">Agent Core</text>
<text x="487" y="159" class="small" text-anchor="middle">Planner · Tool Selector · Observer</text>

<!-- Think / Act / Observe 三态 -->
<rect x="340" y="178" width="86" height="40" rx="10" fill="#ffffff" stroke="#c8c5f6" stroke-width="1.3"/>
<text x="383" y="203" class="chip" text-anchor="middle">Think</text>
<rect x="444" y="178" width="86" height="40" rx="10" fill="#ffffff" stroke="#c8c5f6" stroke-width="1.3"/>
<text x="487" y="203" class="chip" text-anchor="middle">Act</text>
<rect x="548" y="178" width="86" height="40" rx="10" fill="#ffffff" stroke="#c8c5f6" stroke-width="1.3"/>
<text x="591" y="203" class="chip" text-anchor="middle">Observe</text>
<line x1="426" y1="198" x2="442" y2="198" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar-brand)"/>
<line x1="530" y1="198" x2="546" y2="198" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar-brand)"/>
<!-- 反馈回环: Observe 底 -> Think 底，弧线压低到 248，文字放弧线下方不重叠 -->
<path d="M 591 218 C 591 250 383 250 383 220" fill="none" stroke="#7c6df2" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#ar-loop)"/>
<text x="487" y="266" class="cap" text-anchor="middle" fill="#7c6df2">反馈循环</text>

<line x1="656" y1="176" x2="768" y2="176" stroke="#4f46e5" stroke-width="2.4" marker-end="url(#ar-brand)"/>

<!-- 真实动作 -->
<rect x="774" y="128" width="160" height="96" rx="14" fill="#ffffff" stroke="#e1e4ee" stroke-width="1.5" filter="url(#sh)"/>
<g transform="translate(854,152)" stroke="#5a6373" fill="none" stroke-linecap="round" stroke-linejoin="round">
<path d="M-3,-10 l-9,4 a13,13 0 0 0 9,16 a13,13 0 0 0 9,-16 Z" stroke-width="2"/>
<path d="M-4,0 l3,3 l6,-7" stroke-width="2"/>
</g>
<text x="854" y="200" class="label" text-anchor="middle">真实动作</text>
<text x="854" y="217" class="mono" text-anchor="middle" fill="#5a6373">search / file / API</text>

<!-- 风险 / 密码学接口 双卡 (y=330) -->
<rect x="40" y="328" width="426" height="150" rx="16" fill="#fdf2ef" stroke="#f4cabd" stroke-width="1.5" filter="url(#sh)"/>
<rect x="40" y="328" width="6" height="150" rx="3" fill="#e0533d"/>
<circle cx="78" cy="362" r="13" fill="#fdeee9"/>
<path d="M78,355 v8 M78,368 v0.5" stroke="#e0533d" stroke-width="2.4" stroke-linecap="round"/>
<text x="102" y="367" class="hd" fill="#e0533d">风险</text>
<text x="66" y="402" class="small">模型判断会触发工具调用，</text>
<text x="66" y="424" class="small">错误输出会变成真实系统动作。</text>
<text x="66" y="454" class="small">prompt 注入、参数污染、错误工具选择都放大影响。</text>

<rect x="494" y="328" width="426" height="150" rx="16" fill="#ecf7f2" stroke="#a4ddc9" stroke-width="1.5" filter="url(#sh)"/>
<rect x="494" y="328" width="6" height="150" rx="3" fill="#11926c"/>
<circle cx="532" cy="362" r="13" fill="#e6f5ef"/>
<path d="M527,362 l3.5,3.5 l6,-7" stroke="#11926c" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<text x="556" y="367" class="hd" fill="#11926c">密码学接口</text>
<text x="520" y="402" class="small">给高风险动作加证明、</text>
<text x="520" y="424" class="small">签名和策略约束。</text>
<text x="520" y="454" class="small">先证明动作满足边界，再允许工具执行。</text>
</svg>
