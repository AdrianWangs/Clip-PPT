<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #20242f; }
.title { font-size: 27px; font-weight: 800; letter-spacing: -0.5px; }
.subtitle { font-size: 14px; fill: #5a6373; }
.head { font-size: 17px; font-weight: 800; }
.row { font-size: 13.5px; font-weight: 600; }
.note { font-size: 12.5px; font-weight: 600; }
.tiny { font-size: 11px; font-weight: 600; fill: #8a92a3; }
.callout { font-size: 13.5px; font-weight: 600; }
</style>
<defs>
<linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#6d68f0"/><stop offset="1" stop-color="#4f46e5"/>
</linearGradient>
<linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#1bae8a"/><stop offset="1" stop-color="#11926c"/>
</linearGradient>
<linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#ee6c54"/><stop offset="1" stop-color="#e0533d"/>
</linearGradient>
<marker id="ar-gray" markerWidth="9" markerHeight="7" refX="7.5" refY="3.5" orient="auto">
<path d="M0,0 L9,3.5 L0,7 Z" fill="#aab0bd"/>
</marker>
<filter id="card-sh" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#2a3354" flood-opacity="0.10"/>
</filter>
<filter id="dot-sh" x="-60%" y="-60%" width="220%" height="220%">
<feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2a3354" flood-opacity="0.20"/>
</filter>
</defs>
<rect width="960" height="540" fill="#ffffff"/>
<text x="40" y="50" class="title">从软信任到硬保证</text>
<text x="40" y="76" class="subtitle">工程手段降低风险；密码学改变信任前提。</text>

<!-- ===== 左卡片：软信任（工程） ===== -->
<g>
<rect x="70" y="116" width="355" height="272" rx="18" fill="#ffffff" stroke="#f4cabd" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="70" y="116" width="355" height="6" rx="3" fill="url(#g-red)"/>
<circle cx="112" cy="162" r="21" fill="url(#g-red)" filter="url(#dot-sh)"/>
<g transform="translate(112,162)" stroke="#ffffff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<circle r="7"/><circle r="2.6" fill="#ffffff" stroke="none"/>
<line x1="0" y1="-7" x2="0" y2="-11"/><line x1="0" y1="7" x2="0" y2="11"/>
<line x1="-7" y1="0" x2="-11" y2="0"/><line x1="7" y1="0" x2="11" y2="0"/>
<line x1="-5" y1="-5" x2="-8" y2="-8"/><line x1="5" y1="-5" x2="8" y2="-8"/>
<line x1="-5" y1="5" x2="-8" y2="8"/><line x1="5" y1="5" x2="8" y2="8"/>
</g>
<text x="146" y="168" class="head" fill="#e0533d">软信任（工程）</text>
<!-- 行 -->
<g>
<rect x="95" y="196" width="305" height="32" rx="10" fill="#fdf3f0" stroke="#f4d6cd" stroke-width="1.1"/>
<circle cx="117" cy="212" r="9" fill="#ffffff"/><circle cx="117" cy="212" r="4.5" fill="none" stroke="#e0533d" stroke-width="2"/>
<text x="139" y="217" class="row">声誉 / 合规</text>
</g>
<g>
<rect x="95" y="236" width="305" height="32" rx="10" fill="#fdf3f0" stroke="#f4d6cd" stroke-width="1.1"/>
<circle cx="117" cy="252" r="9" fill="#ffffff"/><circle cx="117" cy="252" r="4.5" fill="none" stroke="#e0533d" stroke-width="2"/>
<text x="139" y="257" class="row">日志 / 审计</text>
</g>
<g>
<rect x="95" y="276" width="305" height="32" rx="10" fill="#fdf3f0" stroke="#f4d6cd" stroke-width="1.1"/>
<circle cx="117" cy="292" r="9" fill="#ffffff"/><circle cx="117" cy="292" r="4.5" fill="none" stroke="#e0533d" stroke-width="2"/>
<text x="139" y="297" class="row">沙箱 / RBAC</text>
</g>
<g>
<rect x="95" y="316" width="305" height="32" rx="10" fill="#fdf3f0" stroke="#f4d6cd" stroke-width="1.1"/>
<circle cx="117" cy="332" r="9" fill="#ffffff"/><circle cx="117" cy="332" r="4.5" fill="none" stroke="#e0533d" stroke-width="2"/>
<text x="139" y="337" class="row">人工确认</text>
</g>
<line x1="100" y1="360" x2="395" y2="360" stroke="#fbe1d9" stroke-width="1.2"/>
<text x="247" y="379" class="note" text-anchor="middle" fill="#e0533d">前提：运营方大体诚实</text>
</g>

<!-- ===== 跨信任域分界 ===== -->
<line x1="480" y1="150" x2="480" y2="356" stroke="#cdd2dd" stroke-width="1.6" stroke-dasharray="5 5"/>
<line x1="432" y1="252" x2="528" y2="252" stroke="#aab0bd" stroke-width="2" marker-end="url(#ar-gray)"/>
<rect x="447" y="128" width="66" height="22" rx="11" fill="#f3f4f8"/>
<text x="480" y="143" class="tiny" text-anchor="middle">跨信任域</text>

<!-- ===== 右卡片：硬保证（密码学） ===== -->
<g>
<rect x="535" y="116" width="355" height="272" rx="18" fill="#ffffff" stroke="#b8e6d6" stroke-width="1.5" filter="url(#card-sh)"/>
<rect x="535" y="116" width="355" height="6" rx="3" fill="url(#g-green)"/>
<circle cx="577" cy="162" r="21" fill="url(#g-green)" filter="url(#dot-sh)"/>
<g transform="translate(577,162)">
<rect x="-8" y="-1" width="16" height="13" rx="3" fill="#ffffff"/>
<path d="M-4.5,-1 V-6 a4.5,4.5 0 0 1 9,0 V-1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
<circle cx="0" cy="4.5" r="1.8" fill="#11926c"/><line x1="0" y1="5.5" x2="0" y2="8.5" stroke="#11926c" stroke-width="1.6" stroke-linecap="round"/>
</g>
<text x="611" y="168" class="head" fill="#11926c">硬保证（密码学）</text>
<!-- 行 -->
<g>
<rect x="560" y="196" width="305" height="32" rx="10" fill="#edf8f3" stroke="#c3e7d8" stroke-width="1.1"/>
<circle cx="582" cy="212" r="9" fill="url(#g-green)"/>
<path d="M577,212 L580.5,215.5 L587,208.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="604" y="217" class="row">不可伪造</text>
</g>
<g>
<rect x="560" y="236" width="305" height="32" rx="10" fill="#edf8f3" stroke="#c3e7d8" stroke-width="1.1"/>
<circle cx="582" cy="252" r="9" fill="url(#g-green)"/>
<path d="M577,252 L580.5,255.5 L587,248.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="604" y="257" class="row">不可窥探</text>
</g>
<g>
<rect x="560" y="276" width="305" height="32" rx="10" fill="#edf8f3" stroke="#c3e7d8" stroke-width="1.1"/>
<circle cx="582" cy="292" r="9" fill="url(#g-green)"/>
<path d="M577,292 L580.5,295.5 L587,288.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="604" y="297" class="row">可验证</text>
</g>
<g>
<rect x="560" y="316" width="305" height="32" rx="10" fill="#edf8f3" stroke="#c3e7d8" stroke-width="1.1"/>
<circle cx="582" cy="332" r="9" fill="url(#g-green)"/>
<path d="M577,332 L580.5,335.5 L587,328.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="604" y="337" class="row">不可抵赖</text>
</g>
<line x1="565" y1="360" x2="860" y2="360" stroke="#dcf0e8" stroke-width="1.2"/>
<text x="712" y="379" class="note" text-anchor="middle" fill="#11926c">即使运营方是敌手也要成立</text>
</g>

<!-- ===== 底部判断标准 ===== -->
<rect x="160" y="436" width="640" height="58" rx="16" fill="#eeeefe" stroke="#c8c5f6" stroke-width="1.3" filter="url(#card-sh)"/>
<circle cx="200" cy="465" r="17" fill="url(#g-indigo)"/>
<g transform="translate(200,465)" stroke="#ffffff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<circle r="8"/><circle r="3.4"/>
</g>
<text x="236" y="471" class="callout" fill="#3a32c4">判断标准：只在价值高、跨信任域、后果明确的接口上使用密码学。</text>
</svg>
